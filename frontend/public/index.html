<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#10b981" />

  <!-- Primary SEO -->
  <title>Botfolio — AI Portfolio Chatbot Builder</title>
  <meta name="description"
    content="Transform your resume into a conversational AI portfolio chatbot in 5 minutes. Let your work & experience speak for itself — literally." />
  <meta name="keywords"
    content="AI portfolio, portfolio chatbot, resume chatbot, AI career, portfolio builder, personal AI assistant" />
  <meta name="author" content="Botfolio" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://mybotfolio.vercel.app/" />
  <meta property="og:title" content="Botfolio — AI Portfolio Chatbot Builder" />
  <meta property="og:description"
    content="Transform your resume into a conversational AI portfolio chatbot in 5 minutes. Let your work & experience speak for itself — literally." />
  <meta property="og:image" content="https://mybotfolio.vercel.app/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:site_name" content="Botfolio" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:url" content="https://mybotfolio.vercel.app/" />
  <meta name="twitter:title" content="Botfolio — AI Portfolio Chatbot Builder" />
  <meta name="twitter:description"
    content="Transform your resume into a conversational AI portfolio chatbot in 5 minutes. Let your work & experience speak for itself — literally." />
  <meta name="twitter:image" content="https://mybotfolio.vercel.app/og-image.png" />

  <!-- Canonical -->
  <link rel="canonical" href="https://mybotfolio.vercel.app/" />

  <!-- Favicons -->
  <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="%PUBLIC_URL%/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="%PUBLIC_URL%/favicon-16x16.png" />
  <link rel="apple-touch-icon" href="%PUBLIC_URL%/favicon-32x32.png" />
  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

  <!-- Google Analytics (GA4) — replace G-XXXXXXXXXX with your Measurement ID -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-XXXXXXXXXX', {
      anonymize_ip: true,
      cookie_flags: 'SameSite=None;Secure'
    });
  </script>
</head>

<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root">
    <!-- Pre-boot Loading Shell (Shows instantly before React loads) -->
    <style>
      .preboot-loader {
        position: fixed;
        inset: 0;
        background: #000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
      }

      .preboot-logo {
        width: 64px;
        height: 64px;
        margin-bottom: 24px;
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }

      .preboot-text {
        color: rgba(255, 255, 255, 0.5);
        font-size: 14px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        font-weight: 600;
      }

      @keyframes pulse {

        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }

        50% {
          opacity: 0.5;
          transform: scale(0.95);
        }
      }
    </style>
    <div class="preboot-loader">
      <img src="/assets/botfolio-logo-bg.png" alt="Botfolio" class="preboot-logo" />
      <div class="preboot-text">Loading Workspace...</div>
    </div>
  </div>

  <!-- Google AdSense — replace ca-pub-XXXXXXXXXXXXXX with your publisher ID -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXX"
    crossorigin="anonymous"></script>

  <!-- Razorpay Checkout -->
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</body>

</html>
